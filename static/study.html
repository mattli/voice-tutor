<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Voice Tutor — Study</title>
<style>
  body { font-family: system-ui, sans-serif; max-width: 640px; margin: 2rem auto; padding: 0 1rem; line-height: 1.5; }
  h1 { font-size: 1.4rem; margin-bottom: 0.25rem; }
  .muted { color: #666; }
  .card { border: 1px solid #ddd; border-radius: 8px; padding: 1rem; margin-bottom: 1rem; cursor: pointer; }
  .card:hover { border-color: #2a6df4; }
  button { font-size: 1rem; padding: 0.5rem 1rem; border-radius: 6px; border: 1px solid #2a6df4; background: #2a6df4; color: #fff; cursor: pointer; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  button.secondary { background: #fff; color: #2a6df4; }
  .hidden { display: none; }
  pre { white-space: pre-wrap; background: #f5f5f5; padding: 1rem; border-radius: 6px; }
  .row { display: flex; gap: 0.75rem; align-items: center; margin: 0.75rem 0; }
  #artifactView { background: #f5f5f5; padding: 1rem; border-radius: 6px; }
  #artifactView h1, #artifactView h2, #artifactView h3 { margin-top: 1rem; }
  #artifactView :first-child { margin-top: 0; }
</style>
</head>
<body>

<h1>Voice Tutor — Study</h1>
<p class="muted">Pick a document or upload one, then start a voice session grounded in it.</p>

<section id="picker">
  <h2 style="font-size:1rem;">Documents</h2>
  <div id="docList" class="muted">Loading…</div>
  <form id="uploadForm" class="row">
    <input type="file" id="fileInput" accept=".pdf,.md,.markdown,.txt" required />
    <button type="submit" class="secondary">Upload</button>
  </form>
  <div class="row">
    <span id="pickerStatus" class="muted"></span>
  </div>
</section>

<section id="session" class="hidden">
  <p>Session about: <strong id="sessionDocTitle"></strong></p>
  <audio id="remoteAudio" autoplay playsinline></audio>
  <div class="row">
    <button id="startBtn">Start session</button>
    <button id="endBtn" class="hidden">End session</button>
    <button id="backBtn" class="secondary">Back</button>
    <span id="sessionStatus" class="muted"></span>
  </div>
</section>

<section id="ended" class="hidden">
  <p id="endedStatus" class="muted">Generating recap…</p>
  <div id="artifactView" class="hidden"></div>
  <div class="row">
    <button id="newBtn" class="secondary">New session</button>
  </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<script>
const $ = id => document.getElementById(id);
const show = id => { ['picker','session','ended'].forEach(s => $(s).classList.toggle('hidden', s !== id)); };

let selectedDocId = null;
let selectedDocTitle = null;
let pc = null;
let pcId = null;
let sessionId = null;
let connectedAt = null;  // ms timestamp when pc first reached 'connected'

const MIN_RECAP_DURATION_SEC = 5;
const MAX_POLL_ATTEMPTS = 30;  // 30 ticks × 2s = 60s cap

async function loadDocs() {
  const docs = await fetch('/api/documents').then(r => r.json());
  const list = $('docList');
  if (!docs.length) { list.textContent = 'No documents yet — upload one to start.'; return; }
  list.innerHTML = '';
  for (const d of docs) {
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.id = d.document_id;
    card.innerHTML = `<strong>${escapeHtml(d.title)}</strong><br><span class="muted">${d.char_count.toLocaleString()} chars · ${d.uploaded_at.slice(0,10)}</span>`;
    card.onclick = () => selectDoc(d.document_id, d.title);
    list.appendChild(card);
  }
}

function selectDoc(id, title) {
  selectedDocId = id;
  selectedDocTitle = title;
  $('sessionDocTitle').textContent = title;
  $('sessionStatus').textContent = '';
  $('startBtn').classList.remove('hidden');
  $('endBtn').classList.add('hidden');
  $('backBtn').classList.remove('hidden');
  show('session');
}

function escapeHtml(s) { return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

$('uploadForm').onsubmit = async e => {
  e.preventDefault();
  const file = $('fileInput').files[0];
  if (!file) return;
  $('pickerStatus').textContent = 'Uploading…';
  const fd = new FormData();
  fd.append('file', file);
  const r = await fetch('/api/documents', { method: 'POST', body: fd });
  if (!r.ok) {
    $('pickerStatus').textContent = 'Upload failed: ' + (await r.text());
    return;
  }
  $('pickerStatus').textContent = 'Uploaded.';
  $('fileInput').value = '';
  await loadDocs();
};

$('startBtn').onclick = async () => {
  if (!selectedDocId) return;
  sessionId = crypto.randomUUID();
  $('startBtn').classList.add('hidden');
  $('backBtn').classList.add('hidden');
  $('endBtn').classList.remove('hidden');
  $('sessionStatus').textContent = 'Connecting…';
  await connect();
};

$('backBtn').onclick = () => {
  selectedDocId = null;
  selectedDocTitle = null;
  show('picker');
};

async function connect() {
  pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
  pc.addTransceiver('audio', { direction: 'sendrecv' });
  const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
  for (const t of stream.getTracks()) pc.addTrack(t, stream);
  pc.ontrack = ev => { $('remoteAudio').srcObject = ev.streams[0]; };
  pc.onconnectionstatechange = () => {
    if (pc.connectionState === 'connected' && connectedAt === null) {
      connectedAt = Date.now();
    }
    const label = {
      'new': 'Connecting…',
      'connecting': 'Connecting…',
      'connected': 'Listening — speak whenever you’re ready',
      'disconnected': 'Disconnected',
      'failed': 'Connection failed',
      'closed': 'Disconnected',
    }[pc.connectionState] || pc.connectionState;
    $('sessionStatus').textContent = label;
  };

  // Open and drain pipecat's RTVI data channel so the server-side queue
  // doesn't fill up. We don't render the events — this just keeps them flowing.
  const dc = pc.createDataChannel('messages');
  dc.onmessage = () => {};

  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);

  const resp = await fetch('/api/offer', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      sdp: offer.sdp,
      type: offer.type,
      request_data: { document_id: selectedDocId, session_id: sessionId },
    }),
  });
  const answer = await resp.json();
  pcId = answer.pc_id;
  await pc.setRemoteDescription(answer);

  pc.onicecandidate = async ev => {
    if (!ev.candidate) return;
    await fetch('/api/offer', {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ pc_id: pcId, candidates: [ev.candidate.toJSON()] }),
    });
  };
}

let pollTimer = null;

$('endBtn').onclick = () => {
  if (pc) pc.close();
  show('ended');
  $('artifactView').classList.add('hidden');
  const elapsedSec = connectedAt ? (Date.now() - connectedAt) / 1000 : 0;
  if (elapsedSec < MIN_RECAP_DURATION_SEC) {
    $('endedStatus').textContent = 'Session ended — too short for a recap.';
    return;
  }
  $('endedStatus').textContent = 'Generating recap…';
  pollArtifact();
};

async function pollArtifact() {
  if (pollTimer) clearInterval(pollTimer);
  const target = sessionId;
  let attempts = 0;
  const tick = async () => {
    if (target !== sessionId) return;  // user moved on
    attempts++;
    const r = await fetch(`/api/sessions/${target}/artifact`);
    if (r.ok) {
      clearInterval(pollTimer);
      pollTimer = null;
      const md = await r.text();
      const view = $('artifactView');
      view.innerHTML = window.marked ? marked.parse(md) : md;
      view.classList.remove('hidden');
      $('endedStatus').textContent = 'Recap ready.';
      return;
    }
    if (attempts >= MAX_POLL_ATTEMPTS) {
      clearInterval(pollTimer);
      pollTimer = null;
      $('endedStatus').textContent = 'Recap didn’t generate within 60s — check server logs.';
    }
  };
  tick();
  pollTimer = setInterval(tick, 2000);
}

$('newBtn').onclick = () => {
  if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
  selectedDocId = null;
  selectedDocTitle = null;
  sessionId = null;
  connectedAt = null;
  $('artifactView').classList.add('hidden');
  show('picker');
  loadDocs();
};

loadDocs();
</script>

</body>
</html>
